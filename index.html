<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ccfire</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #fff;
    }

    h1 span { color: #f97316; }

    label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea, input[type="text"], select {
      width: 100%;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.9rem;
      padding: 0.75rem;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus, input[type="text"]:focus, select:focus {
      border-color: #f97316;
    }

    textarea {
      height: 160px;
      resize: vertical;
      margin-bottom: 1rem;
    }

    input[type="text"], select {
      margin-bottom: 1rem;
    }

    select option {
      background: #141414;
      color: #e0e0e0;
    }

    .row {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.3rem;
    }

    .row .field { flex: 1; }

    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      color: #555;
    }

    .mode-toggle a {
      color: #f97316;
      cursor: pointer;
      text-decoration: none;
    }

    .mode-toggle a:hover { text-decoration: underline; }

    .actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    button {
      background: #f97316;
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.4rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      font-size: 0.85rem;
      color: #888;
    }

    .status.running { color: #f59e0b; }
    .status.done { color: #22c55e; }
    .status.error { color: #ef4444; }

    .usage-bar {
      display: none;
      gap: 1.2rem;
      margin-bottom: 1rem;
      padding: 0.7rem 1rem;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #888;
      flex-wrap: wrap;
    }

    .usage-bar.visible { display: flex; }

    .usage-bar .item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .usage-bar .item .val {
      color: #e0e0e0;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .output-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 1rem;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 500px;
      overflow-y: auto;
      display: none;
      line-height: 1.5;
    }

    .output-box.visible { display: block; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1><span>cc</span>fire</h1>

    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="Enter your prompt for Claude..."></textarea>

    <div class="row">
      <div class="field" id="project-field">
        <label for="project">Project</label>
        <select id="project">
          <option value="">None (general prompt)</option>
        </select>
      </div>
      <div class="field hidden" id="cwd-field">
        <label for="cwd">Working Directory</label>
        <input type="text" id="cwd" placeholder="/absolute/path or relative-to-projects">
      </div>
      <div class="field">
        <label for="session">Session</label>
        <input type="text" id="session" placeholder="my-session">
      </div>
    </div>
    <div class="mode-toggle">
      <span id="mode-label">Select a mounted project or</span>
      <a id="mode-switch">use a custom path</a>
    </div>

    <div class="actions">
      <button id="run">Run with Claude</button>
      <span id="status" class="status"></span>
    </div>

    <div id="usage" class="usage-bar">
      <div class="item">Duration <span class="val" id="u-duration">-</span></div>
      <div class="item">Cost <span class="val" id="u-cost">-</span></div>
      <div class="item">In <span class="val" id="u-in">-</span></div>
      <div class="item">Out <span class="val" id="u-out">-</span></div>
      <div class="item">Cached <span class="val" id="u-cache">-</span></div>
      <div class="item">Turns <span class="val" id="u-turns">-</span></div>
    </div>

    <div id="output" class="output-box"></div>
  </div>

  <script>
    const $prompt = document.getElementById("prompt");
    const $project = document.getElementById("project");
    const $projectField = document.getElementById("project-field");
    const $cwd = document.getElementById("cwd");
    const $cwdField = document.getElementById("cwd-field");
    const $session = document.getElementById("session");
    const $run = document.getElementById("run");
    const $status = document.getElementById("status");
    const $output = document.getElementById("output");
    const $usage = document.getElementById("usage");
    const $modeSwitch = document.getElementById("mode-switch");
    const $modeLabel = document.getElementById("mode-label");

    let pollTimer = null;
    let useCustomPath = false;

    // Toggle between project picker and free-form path
    $modeSwitch.addEventListener("click", () => {
      useCustomPath = !useCustomPath;
      $projectField.classList.toggle("hidden", useCustomPath);
      $cwdField.classList.toggle("hidden", !useCustomPath);
      if (useCustomPath) {
        $modeLabel.textContent = "Using custom path or";
        $modeSwitch.textContent = "pick a project";
      } else {
        $modeLabel.textContent = "Select a mounted project or";
        $modeSwitch.textContent = "use a custom path";
      }
    });

    // Load available projects on page load
    async function loadProjects() {
      try {
        const res = await fetch("/api/projects");
        const projects = await res.json();
        projects.forEach((name) => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          $project.appendChild(opt);
        });
      } catch {}
    }
    loadProjects();

    $run.addEventListener("click", async () => {
      const prompt = $prompt.value.trim();
      if (!prompt) return;

      $run.disabled = true;
      $output.classList.remove("visible");
      $output.textContent = "";
      $usage.classList.remove("visible");
      setStatus("running", "Running...");

      try {
        const body = { prompt };
        const cwd = useCustomPath ? $cwd.value.trim() : $project.value;
        const session = $session.value.trim();
        if (cwd) body.cwd = cwd;
        if (session) body.session = session;

        const res = await fetch("/api/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        const { job_id, error } = await res.json();
        if (error) throw new Error(error);

        pollTimer = setInterval(() => pollStatus(job_id), 2000);
      } catch (err) {
        setStatus("error", err.message);
        $run.disabled = false;
      }
    });

    async function pollStatus(jobId) {
      try {
        const res = await fetch(`/api/status/${jobId}`);
        const data = await res.json();

        if (data.status === "done") {
          clearInterval(pollTimer);
          setStatus("done", "Done");
          showOutput(data.output);
          showUsage(data.usage);
          $run.disabled = false;
        } else if (data.status === "error") {
          clearInterval(pollTimer);
          setStatus("error", "Error (exit " + data.exitCode + ")");
          showOutput(data.output || data.stderr || "Unknown error");
          showUsage(data.usage);
          $run.disabled = false;
        }
      } catch {
        clearInterval(pollTimer);
        setStatus("error", "Lost connection");
        $run.disabled = false;
      }
    }

    function setStatus(type, text) {
      $status.className = "status " + type;
      $status.textContent = text;
    }

    function showOutput(text) {
      $output.textContent = text;
      $output.classList.add("visible");
    }

    function showUsage(usage) {
      if (!usage) return;
      document.getElementById("u-duration").textContent = (usage.duration_ms / 1000).toFixed(1) + "s";
      document.getElementById("u-cost").textContent = "$" + usage.cost_usd.toFixed(4);
      document.getElementById("u-in").textContent = usage.input_tokens.toLocaleString();
      document.getElementById("u-out").textContent = usage.output_tokens.toLocaleString();
      document.getElementById("u-cache").textContent = usage.cache_read_tokens.toLocaleString();
      document.getElementById("u-turns").textContent = usage.num_turns;
      $usage.classList.add("visible");
    }
  </script>
</body>
</html>
